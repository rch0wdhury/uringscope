# SPDX-License-Identifier: MIT
# Boot the kernel matrix in a VM and run uringscope's full suite on each --
# the portability claim, executed. One CO-RE binary across the matrix; each
# kernel's BTF probe must select the right tracepoint variant (e.g. 6.17's
# cqe-collapsed io_uring_complete) and the pathology suite must pass.
#
# The kernel list lives in test/kernels.txt so docs and CI cannot drift.
# test/vmtest/run.sh uses virtme-ng (vng) to fetch+boot each kernel under
# KVM and run test/vmtest/guest.sh inside.
name: vmtest
on:
  schedule: [{ cron: "17 4 * * *" }]
  workflow_dispatch:
  pull_request:
    paths: ['bpf/**', 'src/**', 'test/**', 'Makefile']
jobs:
  matrix:
    runs-on: ubuntu-24.04
    outputs:
      kernels: ${{ steps.k.outputs.kernels }}
    steps:
      - uses: actions/checkout@v4
      - id: k
        run: |
          ks=$(grep -v '^#' test/kernels.txt | awk 'NF{printf "\"%s\",",$1}' | sed 's/,$//')
          echo "kernels=[$ks]" >> "$GITHUB_OUTPUT"
  vmtest:
    needs: matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        kernel: ${{ fromJson(needs.matrix.outputs.kernels) }}
    steps:
      - uses: actions/checkout@v4
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev libelf-dev zlib1g-dev \
            liburing-dev qemu-system-x86 fio virtme-ng busybox-static zstd \
            linux-tools-common linux-tools-generic
      - name: build
        run: make
      - name: run in VM (tier assertion + pathology injection scoring)
        run: |
          # run.sh maps the kernel label to its expected tier from
          # test/kernels.txt and fails the job on any doctor FAIL or a
          # wrong support tier.
          test/vmtest/run.sh "${{ matrix.kernel }}"
      - name: upload tracepoint formats from this kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tp-formats-${{ matrix.kernel }}
          path: test/vmtest/tracepoint-formats.txt
          if-no-files-found: ignore
