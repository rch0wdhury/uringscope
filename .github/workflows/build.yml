# SPDX-License-Identifier: MIT
name: build
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libbpf-dev libelf-dev zlib1g-dev \
            linux-tools-common linux-tools-generic
      - name: build
        run: make CC=${{ matrix.cc }} V=1
      - name: smoke (load + self-attach on runner kernel)
        run: |
          sudo ./uringscope -d 2 -a || true   # runner kernels vary; report only
          sudo ./uringscope -d 1 -- /bin/true
